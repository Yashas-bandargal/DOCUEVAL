name: RAG Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  eval-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python src/ingest.py

      - name: Run retrieval evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python src/eval_retrieval.py

      - name: Run generation evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python src/eval_generation.py

      - name: Run OOS evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python src/eval_oos.py

      - name: Run regression tests (pytest)
        run: |
          pytest src/test_regression.py -v

      - name: Generate final report
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python src/generate_report.py

      - name: Upload evaluation results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: eval-results
          path: results/
